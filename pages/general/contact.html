<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CozyCorner</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container py-section">
        <div class="card">
            <h1 style="color: var(--primary-color); text-align: center;">Contact Us</h1>
            <p class="text-muted text-center" style="margin-bottom: 2rem;">We'd love to hear from you!</p>
            
            <form>
                <div class="form-group">
                    <label class="form-label" for="name">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
                    <textarea id="message" class="form-control resize-y" rows="4" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-glow w-100">Send Message</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../../backend/app.js"></script>
    <script src="../../backend/auth.js"></script>
</body>
</html>
