<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | CozyCorner</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>

    <main class="auth-main">
        <!-- Back to Home Button -->
        <a href="index.html" class="back-home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Home
        </a>

        <!-- Login View -->
        <div id="login-view" class="auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Please login to your account</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="login-username" class="form-control" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-glow w-100">Login</button>
                <p class="error" id="login-error"></p>
            </form>
            <p class="toggle-text">Don't have an account? <a href="#" id="show-register">Register</a></p>
        </div>

        <!-- Register View -->
        <div id="register-view" class="auth-card hidden">
            <h2>Create Account</h2>
            <p class="subtitle">Register to get started</p>
            <form id="register-form">
                <div class="form-group">
                    <input type="text" id="register-username" class="form-control" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-glow w-100">Register</button>
                <p class="error" id="register-error"></p>
            </form>
            <p class="toggle-text">Already have an account? <a href="#" id="show-login">Login</a></p>
        </div>

        <!-- Dashboard View (Temp placement until dashboard page is made) -->
        <div id="dashboard-view" class="auth-card hidden">
            <h2>Welcome, <span id="user-display" class="highlight"></span>!</h2>
            <p class="subtitle">You have successfully logged in.</p>
            <button id="logout-btn" class="btn btn-primary btn-glow w-100">Logout</button>
        </div>

        <!-- Notification Modal -->
        <div id="auth-notification-modal" class="modal-overlay hidden">
            <div class="auth-card" style="padding: 2.5rem 2rem; max-width: 380px; margin: 0 1rem;">
                <h2>Notice</h2>
                <p class="subtitle" style="margin-bottom: 2rem;">Registration is working! Register now if you don't have an account yet.</p>
                <button id="close-modal-btn" class="btn btn-primary btn-glow w-100">Got it!</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="../../backend/app.js"></script>
</body>
</html>
