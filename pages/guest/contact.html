<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CozyCorner</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="card">
            <h2>Contact Us</h2>
            <p class="subtitle">Have a question? Send us a message.</p>
            <form>
                <div class="form-group"><input type="text" class="form-control" placeholder="Your Name" required></div>
                <div class="form-group"><input type="email" class="form-control" placeholder="Your Email" required></div>
                <div class="form-group"><textarea class="form-control resize-y" placeholder="Your Message" rows="5" required></textarea></div>
                <button type="button" class="btn btn-primary w-100">Send Message</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../../backend/app.js"></script>
</body>
</html>
