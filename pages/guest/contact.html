<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CozyCorner</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="card" style="max-width: 600px;">
            <h2>Contact Us</h2>
            <p class="subtitle">Have a question? Send us a message.</p>
            <form>
                <div class="input-group"><input type="text" placeholder="Your Name" required></div>
                <div class="input-group"><input type="email" placeholder="Your Email" required></div>
                <div class="input-group"><textarea placeholder="Your Message" rows="5" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); font-family: inherit; font-size: 1rem; resize: vertical;" required></textarea></div>
                <button type="button" class="btn">Send Message</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../../backend/app.js"></script>
</body>
</html>
