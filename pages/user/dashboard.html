<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | CozyCorner</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="card card-lg">
            <h2>User Dashboard</h2>
            <p class="subtitle">Welcome to your personal dashboard.</p>
            
            <div class="dashboard-grid">
                <div class="dashboard-widget">
                    <h3>My Reservations</h3><p>View and manage your current bookings.</p>
                </div>
                <div class="dashboard-widget">
                    <h3>Profile Management</h3><p>Update your personal information.</p>
                </div>
                <div class="dashboard-widget">
                    <h3>Support</h3><p>Contact GilMars Airbnb support.</p>
                </div>
            </div>
            <button id="logout-btn" class="btn btn-outline w-100">Logout</button>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../../backend/app.js"></script>
</body>
</html>
