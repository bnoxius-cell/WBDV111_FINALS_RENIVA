<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | CozyCorner</title>
    
    <!-- Global Styles & Glassmorphic RPG Theme -->
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body style="padding-top: 100px;">

    <div id="header-placeholder"></div>

    <main class="container">
        <div class="glass-panel" style="padding: 3rem 2.5rem; margin-top: 2rem;">
            <h1 class="text-cyan" style="margin-bottom: 2rem;">My Bookings</h1>
            
            <!-- Glassmorphic Tab UI -->
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab('upcoming')">Upcoming</button>
                <button class="tab-btn" onclick="openTab('past')">Past</button>
                <button class="tab-btn" onclick="openTab('canceled')">Canceled</button>
            </div>

            <!-- Upcoming Bookings View -->
            <div id="upcoming" class="tab-content active">
                <h2 class="text-green" style="margin-bottom: 1rem;">Upcoming Adventures</h2>
                <div class="glass-panel glass-panel-glow-green" style="padding: 1.5rem;">
                    <h3>Neon City Loft</h3>
                    <p class="text-muted">Check-in: Oct 24, 2024 | Guests: 2</p>
                    <p class="text-cyan" style="margin-top: 1rem; font-weight: bold;">Status: Confirmed</p>
                </div>
            </div>

            <!-- Past Bookings View -->
            <div id="past" class="tab-content">
                <h2 class="text-gold" style="margin-bottom: 1rem;">Past Memories</h2>
                <div class="glass-panel glass-panel-glow-gold" style="padding: 1.5rem;">
                    <h3>Crimson Peak Cabin</h3>
                    <p class="text-muted">Check-out: Jan 12, 2024 | Guests: 4</p>
                    <p class="text-gold" style="margin-top: 1rem; font-weight: bold;">Status: Completed</p>
                </div>
            </div>

            <!-- Canceled Bookings View -->
            <div id="canceled" class="tab-content">
                <h2 class="text-crimson" style="margin-bottom: 1rem;">Canceled Trips</h2>
                <div class="glass-panel glass-panel-glow-crimson" style="padding: 1.5rem;">
                    <h3>Azure Beach Resort</h3>
                    <p class="text-muted">Original Dates: Mar 01 - Mar 05, 2024</p>
                    <p class="text-crimson" style="margin-top: 1rem; font-weight: bold;">Status: Refunded</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../../backend/auth.js"></script>
    <script>
        // 1. Immediately protect route ensuring only 'user' roles (or higher) can view
        checkAccess('user');

        // 2. Tab switching logic
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 3. Load the refactored header and fire the updateNavigation logic
        fetch('../components/header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                if (window.updateNavigation) window.updateNavigation();
            });
    </script>
</body>
</html>
